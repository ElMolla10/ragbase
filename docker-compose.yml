services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragbase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragbase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragbase}
      POSTGRES_DB: ${POSTGRES_DB:-ragbase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragbase -d ragbase"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ragbase-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ragbase}:${POSTGRES_PASSWORD:-ragbase}@postgres:5432/${POSTGRES_DB:-ragbase}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - model_cache:/root/.cache

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ragbase-frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

  metabase:
    image: metabase/metabase:latest
    container_name: ragbase-metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB:-ragbase}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-ragbase}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-ragbase}
      MB_DB_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  model_cache:
